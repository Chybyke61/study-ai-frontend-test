<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study.AI | Development Roadmap</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { 
      font-family: 'Inter', sans-serif;
      background-color: #020617; 
      color: #f8fafc;
      background-image: radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%), 
                        radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.05) 0px, transparent 50%);
      background-attachment: fixed;
    }
    .glass-card { 
      background: rgba(15, 23, 42, 0.6); 
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08); 
      transition: all 0.3s ease;
    }
    .task-item:hover {
      background: rgba(255, 255, 255, 0.03);
    }
    input[type="checkbox"] {
      accent-color: #10b981;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .phase-title { font-family: 'Plus Jakarta Sans', sans-serif; }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeUp 0.5s ease forwards; opacity: 0; }
  </style>
</head>

<body class="min-h-screen py-12 px-6">

<div class="max-w-3xl mx-auto">
  <div class="flex items-center justify-between mb-10 animate-in">
    <div>
      <h1 class="text-3xl font-extrabold text-white phase-title mb-2">
        🚀 Study.<span class="text-emerald-400">AI</span> Roadmap
      </h1>
      <p class="text-slate-400 text-sm font-medium tracking-wide">SYSTEM PROTOCOL: DEVELOPMENT ARCHITECTURE 2026</p>
    </div>
    <button onclick="resetProgress()" class="px-4 py-2 bg-slate-900 border border-red-500/30 text-red-400 rounded-xl text-xs font-bold uppercase tracking-wider hover:bg-red-500/10 transition-all">
      Reset Data
    </button>
  </div>

  <div class="glass-card rounded-3xl p-6 mb-10 animate-in" style="animation-delay: 100ms;">
    <div class="flex justify-between items-end mb-4">
      <span class="text-xs font-bold uppercase tracking-widest text-emerald-400">Build Progress</span>
      <span id="progressText" class="text-2xl font-black text-white phase-title">0%</span>
    </div>
    <div class="w-full bg-slate-950 rounded-full h-3 p-0.5 border border-white/5">
      <div id="progressBar" class="bg-gradient-to-r from-emerald-500 to-indigo-500 h-full rounded-full transition-all duration-700 ease-out shadow-[0_0_15px_rgba(16,185,129,0.3)]" style="width: 0%"></div>
    </div>
  </div>

  <div id="roadmap" class="space-y-6">

    <div class="glass-card rounded-[2rem] p-8 animate-in" style="animation-delay: 200ms;">
      <h2 class="text-emerald-400 phase-title font-bold text-lg mb-4 flex items-center gap-2">
        <i data-lucide="shield-check" class="w-5 h-5"></i> Phase 1: Core Stability
      </h2>
      <div class="space-y-3" id="phase-1-tasks">
        </div>
    </div>

    <div class="glass-card rounded-[2rem] p-8 animate-in" style="animation-delay: 300ms;">
      <h2 class="text-blue-400 phase-title font-bold text-lg mb-4 flex items-center gap-2">
        <i data-lucide="zap" class="w-5 h-5"></i> Phase 2: Intelligence Layer
      </h2>
      <div class="space-y-3" id="phase-2-tasks"></div>
    </div>

    <div class="glass-card rounded-[2rem] p-8 animate-in" style="animation-delay: 400ms;">
      <h2 class="text-indigo-400 phase-title font-bold text-lg mb-4 flex items-center gap-2">
        <i data-lucide="database" class="w-5 h-5"></i> Phase 3: RAG & Vector Memory
      </h2>
      <div class="space-y-3" id="phase-3-tasks"></div>
    </div>

    <div class="glass-card rounded-[2rem] p-8 animate-in" style="animation-delay: 500ms;">
      <h2 class="text-purple-400 phase-title font-bold text-lg mb-4 flex items-center gap-2">
        <i data-lucide="line-chart" class="w-5 h-5"></i> Phase 4: Analytics & Monetization
      </h2>
      <div class="space-y-3" id="phase-4-tasks"></div>
    </div>

  </div>
</div>

<script>
  // Dynamic Task List with Upgraded Features
  const taskData = {
    "phase-1-tasks": [
      "Fix quiz scoring logic & validation",
      "Optimize UI alignment for 12GB+ mobile displays",
      "Implement global Error Boundary handling",
      "Add sleek skeleton loaders for data fetching",
      "Handle Render/Vercel serverless cold starts"
    ],
    "phase-2-tasks": [
      "Deploy /study-mode streaming endpoint",
      "AI-driven semantic chapter summaries",
      "Automated 'Key Concept' extraction",
      "Multi-choice & Theory quiz generation"
    ],
    "phase-3-tasks": [
      "PDF-Parse integration for textbook indexing",
      "Vector store implementation (Supabase pgvector)",
      "Context-aware AI prompt injection",
      "Cross-document knowledge retrieval"
    ],
    "phase-4-tasks": [
      "User study streak & XP system",
      "Visual weak-area heatmap analytics",
      "Subscription tier & Stripe integration",
      "Public 'Share Study Guide' links"
    ]
  };

  // Render Tasks
  Object.keys(taskData).forEach(phaseId => {
    const container = document.getElementById(phaseId);
    taskData[phaseId].forEach((task, i) => {
      const id = `${phaseId}-${i}`;
      container.innerHTML += `
        <div class="task-item flex items-center gap-3 p-3 rounded-xl transition-all">
          <input type="checkbox" id="${id}" class="task">
          <label for="${id}" class="text-slate-300 text-sm font-medium cursor-pointer flex-1">${task}</label>
        </div>
      `;
    });
  });

  const checkboxes = document.querySelectorAll(".task");

  checkboxes.forEach((box) => {
    const saved = localStorage.getItem(box.id);
    if (saved === "true") box.checked = true;

    box.addEventListener("change", () => {
      localStorage.setItem(box.id, box.checked);
      updateProgress();
    });
  });

  function updateProgress() {
    const total = checkboxes.length;
    const completed = [...checkboxes].filter(cb => cb.checked).length;
    const percent = total > 0 ? Math.round((completed / total) * 100) : 0;

    document.getElementById("progressBar").style.width = percent + "%";
    document.getElementById("progressText").innerText = percent + "%";
  }

  function resetProgress() {
    checkboxes.forEach((box) => {
      box.checked = false;
      localStorage.removeItem(box.id);
    });
    updateProgress();
  }

  updateProgress();
  lucide.createIcons();
</script>

</body>
</html>
