<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Study.AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #020617; 
            color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .btn-emerald { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%); 
            transition: all 0.3s ease;
        }
        .btn-emerald:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 20px -10px #10b981; 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-card rounded-[2.5rem] p-8 sm:p-10 w-full max-w-md shadow-2xl animate-in fade-in zoom-in duration-500">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-600/20 border border-emerald-500/30 rounded-2xl mb-6 shadow-xl">
                <i data-lucide="shield-check" class="text-emerald-400 w-8 h-8"></i>
            </div>
            <h2 class="text-3xl font-extrabold tracking-tight text-white mb-2 font-['Plus_Jakarta_Sans']">Secure Engine</h2>
            <p class="text-slate-400 text-sm font-medium">Create a new password for your account</p>
        </div>

        <form id="resetForm" class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] ml-1 mb-2">Account Email</label>
                <div class="relative group">
                    <input id="userEmail" type="email" readonly class="w-full px-5 py-4 rounded-2xl bg-slate-900/40 border border-slate-800 text-slate-500 cursor-not-allowed focus:outline-none italic text-sm font-medium">
                    <div class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-600">
                        <i data-lucide="lock" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] ml-1 mb-2">New Password</label>
                <div class="relative">
                    <input id="newPassword" type="password" required placeholder="Min. 8 characters" class="w-full px-5 py-4 rounded-2xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/40 transition-all pr-12">
                    <button type="button" onclick="togglePassword('newPassword', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors">
                        <i data-lucide="eye"></i>
                    </button>
                </div>

                <div id="passwordRules" class="mt-4 ml-1 space-y-2.5">
                    <div id="rule-length" class="flex items-center gap-2.5 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3 text-slate-600/80"></i>
                        <span>8+ characters</span>
                    </div>
                    <div id="rule-letter" class="flex items-center gap-2.5 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3 text-slate-600/80"></i>
                        <span>At least one letter</span>
                    </div>
                    <div id="rule-number" class="flex items-center gap-2.5 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3 text-slate-600/80"></i>
                        <span>At least one number</span>
                    </div>
                    <div id="rule-symbol" class="flex items-center gap-2.5 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3 text-slate-600/80"></i>
                        <span>Special symbol (@$!%*#?&)</span>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] ml-1 mb-2">Confirm Password</label>
                <div class="relative">
                    <input id="confirmPassword" type="password" required placeholder="Repeat password" class="w-full px-5 py-4 rounded-2xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/40 transition-all pr-12">
                    <button type="button" onclick="togglePassword('confirmPassword', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors">
                        <i data-lucide="eye"></i>
                    </button>
                </div>
            </div>

            <div class="mt-6 p-4 rounded-2xl bg-slate-900/40 border border-slate-800/50 flex flex-col items-center justify-center backdrop-blur-sm">
                <div class="flex items-center gap-2 mb-3 self-start ml-1">
                    <i data-lucide="shield-check" class="w-3 h-3 text-emerald-500"></i>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Security Verification</label>
                </div>
                <div class="cf-turnstile" data-sitekey="0x4AAAAAACuLeZ39cRRtBKwI" data-theme="dark"></div>
            </div>

            <button type="submit" id="submitBtn" class="w-full btn-emerald text-white font-bold py-4 rounded-2xl shadow-lg mt-4 active:scale-95">
                UPDATE PASSWORD
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-800/50 text-center text-sm">
            <a href="index.html" class="text-slate-500 hover:text-emerald-400 font-bold transition-colors flex items-center justify-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Sign In
            </a>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-all duration-300 z-[100] font-bold text-sm pointer-events-none border border-slate-600"></div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            lucide.createIcons();
            let sessionReady = false;

            const supabase = window.supabase.createClient(
                "https://hffbjtbahfwudigywzzx.supabase.co",
                "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5"
            );

            function showToast(message, isError = false) {
                const toast = document.getElementById("toast");
                toast.textContent = message;
                toast.style.borderColor = isError ? "#ef4444" : "#10b981";
                toast.classList.replace("opacity-0", "opacity-100");
                setTimeout(() => { toast.classList.replace("opacity-100", "opacity-0"); }, 3000);
            }

            function updateRule(id, isValid) {
                const el = document.getElementById(id);
                if (!el) return;
                const currentIcon = el.querySelector("i, svg");
                const newIcon = document.createElement("i");
                newIcon.setAttribute("data-lucide", isValid ? "check-circle" : "circle");
                newIcon.className = isValid ? "w-3 h-3 text-emerald-500" : "w-3 h-3 text-slate-600/80";
                if (currentIcon) el.replaceChild(newIcon, currentIcon);
                if (isValid) {
                    el.classList.replace("text-slate-500", "text-emerald-400");
                } else {
                    el.classList.replace("text-emerald-400", "text-slate-500");
                }
                lucide.createIcons({ root: el });
            }

            document.getElementById("newPassword").addEventListener("input", (e) => {
                const val = e.target.value;
                updateRule("rule-length", val.length >= 8);
                updateRule("rule-letter", /[A-Za-z]/.test(val));
                updateRule("rule-number", /\d/.test(val));
                updateRule("rule-symbol", /[@$!%*#?&]/.test(val));
            });

            async function initSessionFromUrl() {
                const hash = window.location.hash;
                const query = window.location.search;
                let params;
                if (hash && hash.includes("access_token")) {
                    params = new URLSearchParams(hash.substring(1));
                } else if (query && query.includes("access_token")) {
                    params = new URLSearchParams(query);
                }
                if (!params) return;
                const access_token = params.get("access_token");
                const refresh_token = params.get("refresh_token");
                if (!access_token || !refresh_token) return;
                await supabase.auth.setSession({ access_token, refresh_token });
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            await initSessionFromUrl();
            const { data: { session } } = await supabase.auth.getSession();

            if (!session) {
                showToast("❌ Invalid or expired reset link", true);
                return;
            }

            document.getElementById("userEmail").value = session.user.email;
            sessionReady = true;

            const form = document.getElementById("resetForm");
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!sessionReady) return showToast("⏳ Please wait a moment...");

                const btn = document.getElementById('submitBtn');
                const newPassword = document.getElementById("newPassword").value;
                const confirm = document.getElementById("confirmPassword").value;
                const turnstileResponse = document.querySelector('[name="cf-turnstile-response"]')?.value;

                if (!turnstileResponse) return showToast("⚠️ Please verify you're human", true);
                
                const strongPassword = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&]).{8,}$/;
                if (!strongPassword.test(newPassword)) return showToast("⚠️ Use a stronger password", true);
                if (newPassword !== confirm) return showToast("❌ Passwords do not match", true);

                btn.disabled = true;
                btn.innerText = "UPDATING...";

                const { error } = await supabase.auth.updateUser({ password: newPassword });

                if (error) {
                    showToast(`❌ ${error.message}`, true);
                    btn.disabled = false;
                    btn.innerText = "UPDATE PASSWORD";
                    if (window.turnstile) turnstile.reset();
                    return;
                }

                showToast("✅ Password reset successful, please login");
                await supabase.auth.signOut();
                setTimeout(() => { window.location.href = "/app?reset=success"; }, 2000);
            });
        });

        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            const currentIcon = btn.querySelector("i, svg");
            const isPassword = input.type === "password";
            input.type = isPassword ? "text" : "password";
            const newIcon = document.createElement("i");
            newIcon.setAttribute("data-lucide", isPassword ? "eye-off" : "eye");
            btn.replaceChild(newIcon, currentIcon);
            lucide.createIcons({ root: btn });
        }
    </script>
</body>
</html>
