<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Study.AI | Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #020617; 
            color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .btn-emerald { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%); 
            transition: all 0.3s ease;
        }
        .btn-emerald:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 20px -10px #10b981; 
        }
        /* Fix for Lucide icons once rendered as SVG */
        svg { display: inline-block; vertical-align: middle; }
    </style>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="globalLoader" class="fixed inset-0 flex flex-col items-center justify-center bg-[#020617] z-[9999] transition-opacity duration-700">
        <div class="absolute inset-0 pointer-events-none opacity-40" style="background-image: radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.05) 0px, transparent 50%);"></div>
        <div class="flex flex-col items-center relative z-10">
            <div class="relative w-24 h-24 mb-8">
                <div class="absolute inset-0 border-[3px] border-emerald-500/10 rounded-full"></div>
                <div class="absolute inset-0 border-[3px] border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <i data-lucide="brain-circuit" class="text-emerald-400 w-10 h-10 animate-pulse"></i>
                </div>
            </div>
            <h1 class="text-white font-['Plus_Jakarta_Sans'] font-extrabold text-2xl tracking-tight mb-2">Study.AI</h1>
            <p class="text-slate-500 text-[10px] font-bold tracking-[0.3em] uppercase">Synchronizing Neural Base</p>
        </div>
    </div>

    <div class="glass-card rounded-[2.5rem] p-8 sm:p-10 w-full max-w-md shadow-2xl">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-600/20 border border-emerald-500/30 rounded-2xl mb-6 shadow-xl">
                <i data-lucide="user-plus" class="text-emerald-400 w-8 h-8"></i>
            </div>
            <h2 class="text-3xl font-extrabold tracking-tight text-white mb-2 font-['Plus_Jakarta_Sans']">Create Identity</h2>
            <p class="text-slate-400 text-sm font-medium">Join the future of document intelligence</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] ml-1 mb-2">Email Address</label>
                <input id="email" type="email" placeholder="student@example.com" class="w-full px-5 py-4 rounded-2xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/40 transition-all">
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] ml-1 mb-2">Password</label>
                <div class="relative">
                    <input id="password" type="password" placeholder="Min. 8 characters" class="w-full px-5 py-4 rounded-2xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/40 transition-all pr-12">
                    <button type="button" onclick="togglePassword('password', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors">
                        <i data-lucide="eye"></i>
                    </button>
                </div>
                
                <div id="passwordRules" class="mt-4 ml-1 space-y-2.5">
                    <div id="rule-length" class="flex items-center gap-2.5 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3 text-slate-600/80"></i>
                        <span>8+ characters</span>
                    </div>
                    <div id="rule-letter" class="flex items-center gap-2.5 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3 text-slate-600/80"></i>
                        <span>At least one letter</span>
                    </div>
                    <div id="rule-number" class="flex items-center gap-2.5 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3 text-slate-600/80"></i>
                        <span>At least one number</span>
                    </div>
                    <div id="rule-symbol" class="flex items-center gap-2.5 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] transition-all duration-300">
                        <i data-lucide="circle" class="w-3 h-3 text-slate-600/80"></i>
                        <span>Special symbol (@$!%*#?&)</span>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] ml-1 mb-2">Confirm Password</label>
                <div class="relative">
                    <input id="confirmPassword" type="password" placeholder="Repeat password" class="w-full px-5 py-4 rounded-2xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/40 transition-all pr-12">
                    <button type="button" onclick="togglePassword('confirmPassword', this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors">
                        <i data-lucide="eye"></i>
                    </button>
                </div>
            </div>

            <div class="mt-6 p-4 rounded-2xl bg-slate-900/40 border border-slate-800/50 flex flex-col items-center justify-center backdrop-blur-sm">
                <div class="flex items-center gap-2 mb-3 self-start ml-1">
                    <i data-lucide="shield-check" class="w-3 h-3 text-emerald-500"></i>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Security Verification</label>
                </div>
                <div class="cf-turnstile" data-sitekey="0x4AAAAAACuLeZ39cRRtBKwI" data-theme="dark"></div>
            </div>

            <div class="flex items-start gap-3 mt-4 mb-2 ml-1">
    <div class="flex items-center h-5">
        <input 
            id="termsCheckbox" 
            type="checkbox" 
            class="w-4 h-4 rounded border-slate-700 bg-slate-900/50 text-emerald-500 focus:ring-emerald-500/40 transition-all cursor-pointer accent-emerald-500"
        >
    </div>
    <div class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.1em] leading-tight">
        <label for="termsCheckbox" class="cursor-pointer select-none">
            I agree to the 
            <a href="/terms" target="_blank" class="text-emerald-400 hover:underline">Terms of Use</a> 
            & 
            <a href="/privacy" target="_blank" class="text-blue-400 hover:underline">Privacy Policy</a>
        </label>
    </div>
</div>


             <button onclick="signUp()" id="signupBtn" disabled class="w-full btn-emerald text-white font-bold py-4 rounded-2xl shadow-lg mt-2 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:grayscale">
    INITIALIZE ACCOUNT
</button>

        </div>

        <div class="flex items-center my-6">
            <div class="flex-1 border-t border-slate-800"></div>
            <span class="px-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest">or</span>
            <div class="flex-1 border-t border-slate-800"></div>
        </div>

        <button onclick="googleLogin()" class="w-full flex items-center justify-center bg-slate-900/50 hover:bg-slate-800 border border-slate-700 hover:border-slate-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 gap-3 group">
            <div class="bg-white p-1.5 rounded-xl group-hover:scale-110 transition-transform">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4" alt="Google">
            </div>
            <span>Continue with Google</span>
        </button>

        <div class="mt-8 pt-6 border-t border-slate-800/50 text-center text-sm">
            <span class="text-slate-500">Already a member?</span> 
            <a href="/app" class="text-emerald-400 font-bold hover:underline ml-1">Sign In</a>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-all duration-300 z-[100] font-bold text-sm pointer-events-none border border-slate-600"></div>

    <script>
const supabaseUrl = "https://hffbjtbahfwudigywzzx.supabase.co";
const supabaseKey = "sb_publishable_HLf2YIFAJsl7V7MKzqw0HA_Ud0lmej5";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

lucide.createIcons();

function showToast(message, isError = false) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.style.borderColor = isError ? "#ef4444" : "#10b981";
    toast.classList.replace("opacity-0", "opacity-100");
    setTimeout(() => {
        toast.classList.replace("opacity-100", "opacity-0");
    }, 3000);
}

function togglePassword(id, btn) {
    const input = document.getElementById(id);
    const currentIcon = btn.querySelector("i, svg");
    const isPassword = input.type === "password";

    input.type = isPassword ? "text" : "password";

    const newIcon = document.createElement("i");
    newIcon.setAttribute("data-lucide", isPassword ? "eye-off" : "eye");
    btn.replaceChild(newIcon, currentIcon);
    lucide.createIcons({ root: btn });
}

function updateRule(id, isValid) {
    const el = document.getElementById(id);
    const currentIcon = el.querySelector("i, svg");

    const newIcon = document.createElement("i");
    newIcon.setAttribute("data-lucide", isValid ? "check-circle" : "circle");
    newIcon.className = isValid
        ? "w-3 h-3 text-emerald-500"
        : "w-3 h-3 text-slate-600/80";

    el.replaceChild(newIcon, currentIcon);

    if (isValid) {
        el.classList.replace("text-slate-500", "text-emerald-400");
    } else {
        el.classList.replace("text-emerald-400", "text-slate-500");
    }

    lucide.createIcons({ root: el });
}

// Password rules
document.getElementById("password").addEventListener("input", (e) => {
    const val = e.target.value;
    updateRule("rule-length", val.length >= 8);
    updateRule("rule-letter", /[A-Za-z]/.test(val));
    updateRule("rule-number", /\d/.test(val));
    updateRule("rule-symbol", /[@$!%*#?&]/.test(val));
});

// ✅ Checkbox → Button control
document.addEventListener("DOMContentLoaded", () => {
    const checkbox = document.getElementById("termsCheckbox");
    const btn = document.getElementById("signupBtn");

    btn.disabled = !checkbox.checked;

    checkbox.addEventListener("change", () => {
        btn.disabled = !checkbox.checked;
    });
});

// ✅ Signup
async function signUp() {
    const btn = document.getElementById("signupBtn");
    const checkbox = document.getElementById("termsCheckbox");

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;
    const turnstileResponse = document.querySelector('[name="cf-turnstile-response"]')?.value;

    // ✅ Enforce terms agreement
    if (!checkbox.checked) {
        return showToast("⚠️ Please agree to Terms & Privacy", true);
    }

    if (!turnstileResponse) return showToast("⚠️ Please verify you're human", true);
    if (!email || !password || !confirm) return showToast("⚠️ Please fill all fields", true);
    if (password !== confirm) return showToast("❌ Passwords do not match", true);

    const strongPassword = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&]).{8,}$/;
    if (!strongPassword.test(password)) return showToast("⚠️ Use a stronger password", true);

    btn.disabled = true;
    btn.innerText = "INITIALIZING...";

    try {
        const { data, error } = await supabaseClient.auth.signUp({
            email,
            password,
            options: { emailRedirectTo: window.location.origin + "/app" }
        });

        if (error) throw error;

        if (data?.user && data.user.identities?.length === 0) {
            showToast("❌ User already exists. Redirecting...", true);
            setTimeout(() => window.location.href = "/app?email=" + encodeURIComponent(email), 1500);
            return;
        }

        showToast("📩 Verification email sent!");
        setTimeout(() => window.location.href = "/app?verify=sent", 2000);

    } catch (err) {
        showToast(`❌ ${err.message}`, true);
        btn.disabled = false;
        btn.innerText = "INITIALIZE ACCOUNT";
        if (window.turnstile) turnstile.reset();
    }
}

// Google login
async function googleLogin() {
    const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo: window.location.origin + "/app" }
    });

    if (error) showToast("❌ Google login failed", true);
}

// Loader
window.addEventListener('load', () => {
    const loader = document.getElementById('globalLoader');
    setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 700);
    }, 800);
});
    </script>
</body>
</html>
